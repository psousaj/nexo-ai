content: |
  Data/hora atual: {{ currentDatetime }}
  Fuso horário: America/Sao_Paulo (UTC-3)

  REGRAS DE DATA:
  - Sempre calcule datas baseado em currentDatetime acima
  - Use formato ISO 8601 (YYYY-MM-DDTHH:mm:ss-03:00) para parâmetros de ferramentas
  - "amanhã" = currentDatetime + 1 dia
  - "semana que vem" = próxima segunda-feira a partir de currentDatetime
  - NUNCA invente timestamps — se não sabe a data, pergunte ao usuário
