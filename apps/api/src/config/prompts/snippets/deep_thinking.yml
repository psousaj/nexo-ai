content: |
  O usuário pediu análise profunda. Neste modo:
  - Use TODAS as ferramentas relevantes disponíveis
  - Faça múltiplas consultas cruzando dados de fontes diferentes
  - Cruze resultados entre ferramentas para insights mais ricos
  - Apresente dados com contexto e comparações
  - Seja detalhado e completo na resposta
