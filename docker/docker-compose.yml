services:
  evolution-api:
    container_name: nexo_evolution_api
    image: atendai/evolution-api:v2.1.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      SERVER_NAME: ${SERVER_NAME:-evolution}
      SERVER_TYPE: ${SERVER_TYPE:-http}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_URL: ${SERVER_URL:-http://localhost:8082}

      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY:?AUTHENTICATION_API_KEY is required}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: ${AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES:-false}

      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI:?DATABASE_CONNECTION_URI is required}
      DATABASE_CONNECTION_CLIENT_NAME: ${DATABASE_CONNECTION_CLIENT_NAME:-nexo_evolution_dev}
      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}

      CACHE_REDIS_ENABLED: ${CACHE_REDIS_ENABLED:-true}
      CACHE_REDIS_URI: ${CACHE_REDIS_URI:?CACHE_REDIS_URI is required}
      CACHE_REDIS_PREFIX_KEY: ${CACHE_REDIS_PREFIX_KEY:-nexo-evolution}
      CACHE_REDIS_SAVE_INSTANCES: ${CACHE_REDIS_SAVE_INSTANCES:-true}
      CACHE_LOCAL_ENABLED: ${CACHE_LOCAL_ENABLED:-false}

      WEBHOOK_GLOBAL_ENABLED: ${WEBHOOK_GLOBAL_ENABLED:-false}
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_GLOBAL_URL:-}

      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      LANGUAGE: ${LANGUAGE:-pt-BR}
    ports:
      - "${EVOLUTION_HOST_PORT:-8082}:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - nexo-runtime

  nexo-app:
    container_name: nexo_app
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}

      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required}
      CLOUDFLARE_GATEWAY_ID: ${CLOUDFLARE_GATEWAY_ID:-nexo-ai-gateway}
      CF_GATEWAY_MODEL: ${CF_GATEWAY_MODEL:-dynamic/nexo}
      CF_INTENT_MODEL: ${CF_INTENT_MODEL:-dynamic/nexo}
      CF_EMBED_MODEL: ${CF_EMBED_MODEL:-dynamic/embeddings}

      TMDB_API_KEY: ${TMDB_API_KEY:?TMDB_API_KEY is required}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:?YOUTUBE_API_KEY is required}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:?SPOTIFY_CLIENT_ID is required}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:?SPOTIFY_CLIENT_SECRET is required}

      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}

      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USER: ${REDIS_USER:?REDIS_USER is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_TLS: ${REDIS_TLS:-false}

      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL:-http://evolution-api:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:?EVOLUTION_API_KEY is required}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-nexo-dev}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:-}
      EVOLUTION_WEBHOOK_PATH: ${EVOLUTION_WEBHOOK_PATH:-/webhook/whatsapp/evolution}

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}

      APP_URL: ${APP_URL:-http://localhost:3002}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3002}

      PROVIDER_SPLIT: ${PROVIDER_SPLIT:-false}

      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      JAEGER_UI_URL: ${JAEGER_UI_URL:-http://localhost:16686}

      SENTRY_ENABLED: ${SENTRY_ENABLED:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_ORG: ${SENTRY_ORG:-ze-filho}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-node-hono}

      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_BOT_USERNAME: ${DISCORD_BOT_USERNAME:-NexoAssistente_bot}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      NUXT_PUBLIC_AUTH_BASE_URL: ${NUXT_PUBLIC_AUTH_BASE_URL:-http://localhost:3002}
      NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:3002/api}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    networks:
      - nexo-runtime

volumes:
  evolution_instances:

networks:
  nexo-runtime:
    driver: bridge
