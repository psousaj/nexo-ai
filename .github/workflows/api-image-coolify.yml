name: API Image for Coolify

on:
  push:
    branches: [ development ]
    paths:
      - apps/api/**
      - apps/bots/**
      - packages/**
      - ecosystem.config.cjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/api-image-coolify.yml
  workflow_dispatch:

concurrency:
  group: api-image-coolify-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nexo-api

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${BRANCH_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.branch_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-coolify:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
      COOLIFY_HEALTHCHECK_URL: ${{ secrets.COOLIFY_HEALTHCHECK_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

    steps:
      - name: Skip deploy when webhook is not configured
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK == '' }}
        run: echo "COOLIFY_DEPLOY_WEBHOOK is empty. Skipping deploy."

      - name: Validate Coolify token
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' && env.COOLIFY_API_TOKEN == '' }}
        run: |
          echo "COOLIFY_API_TOKEN is required when COOLIFY_DEPLOY_WEBHOOK is configured."
          exit 1

      - name: Trigger deploy webhook
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' && env.COOLIFY_API_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const webhook = process.env.COOLIFY_DEPLOY_WEBHOOK;
            const rawToken = process.env.COOLIFY_API_TOKEN || "";
            const token = rawToken.trim().replace(/^Bearer\s+/i, "");

            if (!token) {
              core.setFailed("COOLIFY_API_TOKEN is empty after normalization.");
              return;
            }

            const isCloudflareChallenge = (body) =>
              /just a moment|cf_chl|cf-browser-verification|challenge-platform|attention required/i.test(
                body || "",
              );

            const callDeploy = async (method, authHeader) => {
              let response;
              try {
                response = await fetch(webhook, {
                  method,
                  headers: {
                    Authorization: authHeader,
                    Accept: "application/json",
                    "User-Agent": "github-actions-coolify-deploy",
                  },
                  signal: AbortSignal.timeout(30000),
                });
              } catch {
                return {
                  code: 0,
                  body: "",
                  headers: {},
                };
              }

              const body = await response.text();
              const headers = Object.fromEntries(response.headers.entries());

              return {
                code: response.status,
                body,
                headers,
              };
            };

            const attempts = [
              {
                label: "POST + Bearer",
                method: "POST",
                authHeader: `Bearer ${token}`,
              },
              {
                label: "POST + raw token",
                method: "POST",
                authHeader: token,
              },
              {
                label: "GET + Bearer",
                method: "GET",
                authHeader: `Bearer ${token}`,
              },
              {
                label: "GET + raw token",
                method: "GET",
                authHeader: token,
              },
            ];

            const results = [];

            for (const attempt of attempts) {
              const result = await callDeploy(attempt.method, attempt.authHeader);
              results.push({
                ...attempt,
                ...result,
              });

              if (result.code >= 200 && result.code < 300) {
                core.info(
                  `Coolify deploy triggered (${attempt.label}, HTTP ${result.code}).`,
                );
                return;
              }
            }

            const codesSummary = results
              .map((result) => `${result.label}=${result.code}`)
              .join(", ");

            if (results.some((result) => isCloudflareChallenge(result.body))) {
              core.setFailed(
                `Deploy webhook blocked by Cloudflare challenge before reaching Coolify (${codesSummary}). Use a non-proxied/origin URL in COOLIFY_DEPLOY_WEBHOOK or add a WAF skip rule for this webhook path.`,
              );
            } else if (
              results.some((result) => result.code === 401 || result.code === 403)
            ) {
              core.setFailed(
                `Coolify rejected auth (${codesSummary}). Verify token scope/permission in Coolify.`,
              );
            } else {
              core.setFailed(`Coolify deploy call failed (${codesSummary}).`);
            }

            for (const result of results) {
              core.info(`--- ${result.label} response headers (first 10) ---`);
              Object.entries(result.headers)
                .slice(0, 10)
                .forEach(([key, value]) => core.info(`${key}: ${value}`));

              if (result.body) {
                core.info(`--- ${result.label} response body (first 300 chars) ---`);
                core.info(result.body.slice(0, 300));
              }
            }

      - name: Wait for healthcheck
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' && env.COOLIFY_API_TOKEN != '' &&
          env.COOLIFY_HEALTHCHECK_URL != '' }}
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsS --max-time 10 "${COOLIFY_HEALTHCHECK_URL}" > /dev/null; then
              echo "Healthcheck OK after attempt ${attempt}."
              exit 0
            fi

            echo "Waiting for app health (${attempt}/40)..."
            sleep 15
          done

          echo "App did not become healthy in time."
          exit 1
