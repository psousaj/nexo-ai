name: API Image for Coolify

on:
  push:
    branches: [ development ]
    paths:
      - apps/api/**
      - apps/bots/**
      - packages/**
      - ecosystem.config.cjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/api-image-coolify.yml
  workflow_dispatch:

concurrency:
  group: api-image-coolify-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nexo-api

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${BRANCH_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.branch_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-coolify:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK != '' }}

    steps:
      - name: Trigger deploy webhook
        run: |
          curl -fsS -X POST "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}" \
            || curl -fsS "${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}"

      - name: Wait for healthcheck
        if: ${{ secrets.COOLIFY_HEALTHCHECK_URL != '' }}
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsS --max-time 10 "${{ secrets.COOLIFY_HEALTHCHECK_URL }}" > /dev/null; then
              echo "Healthcheck OK after attempt ${attempt}."
              exit 0
            fi

            echo "Waiting for app health (${attempt}/40)..."
            sleep 15
          done

          echo "App did not become healthy in time."
          exit 1
