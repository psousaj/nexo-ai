name: API Image for Coolify

on:
  push:
    branches: [ development ]
    paths:
      - apps/api/**
      - apps/bots/**
      - packages/**
      - ecosystem.config.cjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/api-image-coolify.yml
  workflow_dispatch:

concurrency:
  group: api-image-coolify-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nexo-api

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${BRANCH_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.branch_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy-coolify:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
      COOLIFY_HEALTHCHECK_URL: ${{ secrets.COOLIFY_HEALTHCHECK_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

    steps:
      - name: Skip deploy when webhook is not configured
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK == '' }}
        run: echo "COOLIFY_DEPLOY_WEBHOOK is empty. Skipping deploy."

      - name: Validate Coolify token
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' && env.COOLIFY_API_TOKEN == '' }}
        run: |
          echo "COOLIFY_API_TOKEN is required when COOLIFY_DEPLOY_WEBHOOK is configured."
          exit 1

      - name: Trigger deploy webhook
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' && env.COOLIFY_API_TOKEN != '' }}
        run: |
          # Normalize token to avoid copy/paste issues (Bearer prefix, spaces, line breaks).
          TOKEN="$(printf '%s' "${COOLIFY_API_TOKEN}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          TOKEN="${TOKEN#Bearer }"
          TOKEN="${TOKEN#bearer }"

          if [ -z "${TOKEN}" ]; then
            echo "::error::COOLIFY_API_TOKEN is empty after normalization."
            exit 1
          fi

          call_deploy() {
            local method="$1"
            local auth_header="$2"
            local out_file="$3"

            curl -sS -o "${out_file}" -w "%{http_code}" \
              -X "${method}" "${COOLIFY_DEPLOY_WEBHOOK}" \
              -H "${auth_header}" \
              -H "Accept: application/json" \
              -H "User-Agent: github-actions-coolify-deploy"
          }

          post_bearer_code="$(call_deploy POST "Authorization: Bearer ${TOKEN}" /tmp/coolify_post_bearer_body.txt || echo 000)"
          if [[ "${post_bearer_code}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Coolify deploy triggered (POST + Bearer, HTTP ${post_bearer_code})."
            exit 0
          fi

          post_raw_code="$(call_deploy POST "Authorization: ${TOKEN}" /tmp/coolify_post_raw_body.txt || echo 000)"
          if [[ "${post_raw_code}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Coolify deploy triggered (POST + raw token, HTTP ${post_raw_code})."
            exit 0
          fi

          get_bearer_code="$(call_deploy GET "Authorization: Bearer ${TOKEN}" /tmp/coolify_get_bearer_body.txt || echo 000)"
          if [[ "${get_bearer_code}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Coolify deploy triggered (GET + Bearer, HTTP ${get_bearer_code})."
            exit 0
          fi

          get_raw_code="$(call_deploy GET "Authorization: ${TOKEN}" /tmp/coolify_get_raw_body.txt || echo 000)"
          if [[ "${get_raw_code}" =~ ^2[0-9][0-9]$ ]]; then
            echo "Coolify deploy triggered (GET + raw token, HTTP ${get_raw_code})."
            exit 0
          fi

          if [ "${post_bearer_code}" = "401" ] || [ "${post_bearer_code}" = "403" ] \
            || [ "${post_raw_code}" = "401" ] || [ "${post_raw_code}" = "403" ] \
            || [ "${get_bearer_code}" = "401" ] || [ "${get_bearer_code}" = "403" ] \
            || [ "${get_raw_code}" = "401" ] || [ "${get_raw_code}" = "403" ]; then
            echo "::error::Coolify rejected auth (POST Bearer=${post_bearer_code}, POST raw=${post_raw_code}, GET Bearer=${get_bearer_code}, GET raw=${get_raw_code})."
            echo "::error::Verify token scope/permission in Coolify and any proxy/WAF rule in front of the domain."
          else
            echo "::error::Coolify deploy call failed (POST Bearer=${post_bearer_code}, POST raw=${post_raw_code}, GET Bearer=${get_bearer_code}, GET raw=${get_raw_code})."
          fi

          for body in /tmp/coolify_post_bearer_body.txt /tmp/coolify_post_raw_body.txt /tmp/coolify_get_bearer_body.txt /tmp/coolify_get_raw_body.txt; do
            if [ -s "${body}" ]; then
              echo "--- ${body} (first 300 chars) ---"
              head -c 300 "${body}" || true
              echo
            fi
          done

          exit 1

      - name: Wait for healthcheck
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' && env.COOLIFY_API_TOKEN != '' &&
          env.COOLIFY_HEALTHCHECK_URL != '' }}
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsS --max-time 10 "${COOLIFY_HEALTHCHECK_URL}" > /dev/null; then
              echo "Healthcheck OK after attempt ${attempt}."
              exit 0
            fi

            echo "Waiting for app health (${attempt}/40)..."
            sleep 15
          done

          echo "App did not become healthy in time."
          exit 1
